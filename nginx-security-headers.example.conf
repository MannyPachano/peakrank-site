# Paste inside your server { } block for Nginx, or include this file.
# Adjust if you add third-party scripts or embeds.

add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com https://www.recaptcha.net; style-src 'self'; img-src 'self' data: blob: https://www.google.com https://www.gstatic.com; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-src 'self' https://www.google.com https://www.recaptcha.net https://www.gstatic.com; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;

# After HTTPS is stable:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
