# Static site: compile SCSS on deploy, publish site root.
# Intake form: Netlify Forms (form name "intake" on contact.html). Enable notifications under Site settings → Forms.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "."

# Optional: pretty URLs for .html (uncomment if you want /about instead of /about.html)
# [[redirects]]
#   from = "/about"
#   to = "/about.html"
#   status = 200
