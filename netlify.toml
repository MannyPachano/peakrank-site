# GitHub → Netlify: connect the repo, use these defaults (or set the same in the Netlify UI).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Baseline hardening (helps Lighthouse “Best practices”; expand CSP/HSTS in the Netlify UI when ready).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
